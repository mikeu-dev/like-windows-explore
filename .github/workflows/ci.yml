name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Developer28*
          POSTGRES_DB: db-like-windows-explore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgres://postgres:Developer28*@127.0.0.1:5432/db-like-windows-explore"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run formatting check
        run: bun format:check

      - name: Run code linter
        run: bun lint

      - name: Run TypeScript type check
        run: bun check

      - name: Setup database schema (Drizzle push)
        run: bun --cwd packages/api db:push

      - name: Seed database initial data
        run: bun --cwd packages/api db:seed

      - name: Run unit tests
        run: bun test

      - name: Install Playwright browsers
        run: bun --cwd packages/e2e playwright install --with-deps

      - name: Run E2E tests
        run: bun test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 30
